[package]
name = "confidential_counter"
version = "0.1.0"
edition = "2024_07"

[dependencies]
openzeppelin_utils = "2.0.0"
starknet = "2.18.0"

[dev-dependencies]
snforge_std = "0.60.0"
assert_macros = "2.18.0"

[scripts]
test = "snforge test"

[tool.scarb]
allow-prebuilt-plugins = ["snforge_std"]

# `allowed-libfuncs-list.name = "all"` is REQUIRED for get_execution_info_v3_syscall
# (it is not on the audited libfuncs list). See DESIGN.md / snip-36 skill.
[[target.starknet-contract]]
allowed-libfuncs-list.name = "all"
sierra = true
casm = true
